version: '3.8'

services:
  # MongoDB for development
  mongo:
    image: mongo:7
    container_name: kipnuni-mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: kipnuni

volumes:
  mongo-dev-data:
    driver: local
